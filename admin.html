<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ChatFlow Admin</title><link rel="stylesheet" href="css/common.css"><link rel="stylesheet" href="css/admin.css">    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="manifest" href="manifest.webmanifest">
</head><body><main class="admin-page"><header class="admin-header"><div><h1>ChatFlow Admin Dashboard</h1><p>User accounts, messages and login activity</p></div><button id="adminLogout" class="secondary-button">Logout</button></header><section id="stats" class="stats-grid"></section><section class="admin-panel"><div class="panel-heading"><h2>Registered Users</h2><input id="userFilter" type="search" placeholder="Search name, phone or email"></div><div class="table-wrap"><table><thead><tr><th>User</th><th>Contact</th><th>Created</th><th>Last seen</th><th>Chats</th><th>Messages</th><th>Logins</th><th>Actions</th></tr></thead><tbody id="usersTable"></tbody></table></div></section><section class="admin-panel"><h2>Recent Login Activity</h2><div class="table-wrap"><table><thead><tr><th>User</th><th>Time</th><th>IP</th><th>Device / Browser</th></tr></thead><tbody id="loginsTable"></tbody></table></div></section></main><script src="js/admin.js"></script></body></html>
